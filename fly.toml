# Fly.io app config. Generated as a starting point for `fly launch --no-deploy`
# then edited by hand - adjust `app` and `primary_region` for your account.

app = "matcher-app"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  DATABASE_URL = "sqlite:////data/matcher.db"

[[mounts]]
  source = "matcher_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
