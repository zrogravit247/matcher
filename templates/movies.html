<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies · Matcher</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar sticky-top matcher-navbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-star text-info me-2"></i>Matcher
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="/watchlist" class="matcher-nav-link">
                    <i class="fas fa-bookmark me-1"></i>Watchlist
                </a>
                <div id="authArea"></div>
            </div>
        </div>
    </nav>
    <div class="container py-5">
        <!-- Header -->
        <div class="text-center mb-5 matcher-hero">
            <h1 class="mb-2">Movie Recommender</h1>
            <p class="lead mb-4">Tell us about 4 movies you love, and we'll find your next one</p>

            <nav class="matcher-segment" aria-label="Content type">
                <a href="/movies" class="active">Movies</a>
                <a href="/tv">TV Series</a>
                <a href="/books">Books</a>
            </nav>
        </div>

        <!-- Movie Input Form -->
        <div class="card mb-4">
            <div class="card-header">
                <h3 class="card-title mb-0">Your Favorite Movies</h3>
            </div>
            <div class="card-body">
                <form id="movieForm">
                    <div class="row justify-content-center">
                        <div class="col-md-8">
                            <div class="mb-3 position-relative">
                                <label for="movie1" class="form-label">Pick #1</label>
                                <input type="text" class="form-control movie-input" id="movie1" placeholder="e.g., The Dark Knight" required autocomplete="off">
                                <div class="suggestions-dropdown d-none" id="suggestions1"></div>
                            </div>
                            <div class="mb-3 position-relative">
                                <label for="movie2" class="form-label">Pick #2</label>
                                <input type="text" class="form-control movie-input" id="movie2" placeholder="e.g., Inception" required autocomplete="off">
                                <div class="suggestions-dropdown d-none" id="suggestions2"></div>
                            </div>
                            <div class="mb-3 position-relative">
                                <label for="movie3" class="form-label">Pick #3</label>
                                <input type="text" class="form-control movie-input" id="movie3" placeholder="e.g., Pulp Fiction" required autocomplete="off">
                                <div class="suggestions-dropdown d-none" id="suggestions3"></div>
                            </div>
                            <div class="mb-4 position-relative">
                                <label for="movie4" class="form-label">Pick #4</label>
                                <input type="text" class="form-control movie-input" id="movie4" placeholder="e.g., Interstellar" required autocomplete="off">
                                <div class="suggestions-dropdown d-none" id="suggestions4"></div>
                            </div>
                        </div>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary btn-lg" id="recommendBtn">
                            Find my match
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Loading State -->
        <div class="text-center py-4 d-none" id="loadingState">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Finding the perfect movie for you...</p>
        </div>

        <!-- Error Messages -->
        <div class="alert alert-danger d-none" role="alert" id="errorAlert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span id="errorMessage"></span>
        </div>

        <!-- Recommendation Result -->
        <div class="card d-none" id="recommendationCard">
            <div class="card-body p-4">
                <div class="row g-4">
                    <div class="col-md-4">
                        <img id="moviePoster" src="" alt="" class="matcher-poster">
                    </div>
                    <div class="col-md-8">
                        <h2 id="movieTitle" class="matcher-rec-title mb-2"></h2>
                        <div class="matcher-meta mb-3">
                            <span id="movieYear"></span>
                            <span class="matcher-rating">
                                <i class="fas fa-star me-1"></i><span id="movieRating"></span>
                            </span>
                        </div>
                        <div class="mb-3 d-flex flex-wrap gap-2" id="movieGenres"></div>
                        <p id="movieOverview" class="matcher-overview"></p>
                        <div class="alert alert-info mb-4" id="movieReasoning" style="display: none;">
                            <h6 class="mb-2"><i class="fas fa-lightbulb me-2"></i>Why we recommend this</h6>
                            <p id="reasoningText" class="mb-0"></p>
                        </div>

                        <!-- Action Buttons -->
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <div class="matcher-action-label mb-2">Your verdict</div>
                                <div class="d-flex gap-2">
                                    <button type="button" class="btn btn-outline-success flex-fill" id="likeBtn">
                                        <i class="fas fa-thumbs-up me-1"></i> Love it
                                    </button>
                                    <button type="button" class="btn btn-outline-danger flex-fill" id="dislikeBtn">
                                        <i class="fas fa-thumbs-down me-1"></i> Not for me
                                    </button>
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <div class="matcher-action-label mb-2">Actions</div>
                                <div class="d-flex gap-2">
                                    <button type="button" class="btn btn-info flex-fill" id="addToWatchlistBtn">
                                        <i class="fas fa-bookmark me-1"></i> Watchlist
                                    </button>
                                    <button type="button" class="btn btn-secondary flex-fill" id="getAnotherBtn">
                                        <i class="fas fa-sync-alt me-1"></i> Another
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="button" class="btn btn-outline-secondary btn-sm" id="resetBtn">
                                Start over
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/feedback.js') }}"></script>
    <script src="{{ url_for('static', filename='js/movies.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
