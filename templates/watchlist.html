<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist · Matcher</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16x16.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar sticky-top matcher-navbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-star text-info me-2"></i>Matcher
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="/watchlist" class="matcher-nav-link">
                    <i class="fas fa-bookmark me-1"></i>Watchlist
                </a>
                <div id="authArea"></div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <!-- Header -->
        <div class="text-center mb-5 matcher-hero">
            <h1 class="mb-2">My Watchlist</h1>
            <p class="lead mb-4">Everything you've saved for later</p>

            <nav class="matcher-segment mb-4" aria-label="Watchlist view">
                <a href="#" class="active" id="moviesToggle">Movies &amp; TV</a>
                <a href="#" id="booksToggle">Reading List</a>
            </nav>

            <div>
                <button id="downloadCsvBtn" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-download me-1"></i>Export CSV
                </button>
            </div>
        </div>

        <!-- Loading State -->
        <div class="text-center py-4 d-none" id="loadingState">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Error Messages -->
        <div class="alert alert-danger d-none" role="alert" id="errorAlert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span id="errorMessage"></span>
        </div>

        <!-- Movies & TV Content -->
        <div id="watchlistContainer"></div>

        <!-- Books Content -->
        <div class="d-none" id="booksContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        const POSTER_PLACEHOLDER = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjQ1MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMjIyYzM1Ii8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNiIgZmlsbD0iIzZiN2E4OCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPk5vIEFydHdvcms8L3RleHQ+PC9zdmc+';

        class WatchlistApp {
            constructor() {
                // Grid tiles render at ~150-190px wide; w342 covers that at
                // retina density for roughly a third of the bytes of w500.
                this.imageBaseURL = 'https://image.tmdb.org/t/p/w342';
                this.currentView = 'movies';
                this.items = [];
                this.initializeApp();
            }

            initializeApp() {
                this.loadElements();
                this.attachToggleListeners();
                this.loadItems();
            }

            loadElements() {
                this.loadingState = document.getElementById('loadingState');
                this.errorAlert = document.getElementById('errorAlert');
                this.errorMessage = document.getElementById('errorMessage');
                this.watchlistContainer = document.getElementById('watchlistContainer');
                this.booksContainer = document.getElementById('booksContainer');
                this.moviesToggle = document.getElementById('moviesToggle');
                this.booksToggle = document.getElementById('booksToggle');
            }

            attachToggleListeners() {
                this.moviesToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.switchView('movies');
                });
                this.booksToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.switchView('books');
                });
            }

            switchView(viewType) {
                this.currentView = viewType;

                this.moviesToggle.classList.toggle('active', viewType === 'movies');
                this.booksToggle.classList.toggle('active', viewType === 'books');

                this.watchlistContainer.classList.toggle('d-none', viewType === 'books');
                this.booksContainer.classList.toggle('d-none', viewType === 'movies');

                this.render();
            }

            async loadItems() {
                this.showLoading(true);
                this.hideError();

                try {
                    const response = await fetch('/api/watchlist');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const contentType = response.headers.get('content-type');
                    if (!contentType || !contentType.includes('application/json')) {
                        throw new Error('Server returned invalid response format');
                    }
                    const data = await response.json();
                    this.items = data.watchlist || [];
                    this.render();
                } catch (error) {
                    console.error('Error loading watchlist:', error);
                    this.showError(error.message || 'Failed to load watchlist');
                } finally {
                    this.showLoading(false);
                }
            }

            render() {
                if (this.currentView === 'movies') {
                    this.renderGrid(
                        this.watchlistContainer,
                        this.items.filter(item => item.content_type !== 'book'),
                        {
                            title: 'Your watchlist is empty',
                            body: "Get a recommendation and save the ones you'd like to watch.",
                            href: '/movies',
                            cta: 'Get recommendations'
                        }
                    );
                } else {
                    this.renderGrid(
                        this.booksContainer,
                        this.items.filter(item => item.content_type === 'book'),
                        {
                            title: 'Your reading list is empty',
                            body: "Get a book recommendation and save the ones you'd like to read.",
                            href: '/books',
                            cta: 'Get book recommendations'
                        }
                    );
                }
            }

            renderGrid(container, items, empty) {
                container.innerHTML = '';

                if (items.length === 0) {
                    const emptyState = document.createElement('div');
                    emptyState.className = 'matcher-empty';
                    emptyState.innerHTML = `
                        <h3 class="h5 mb-2">${empty.title}</h3>
                        <p class="mb-4">${empty.body}</p>
                        <a href="${empty.href}" class="btn btn-primary">${empty.cta}</a>
                    `;
                    container.appendChild(emptyState);
                    return;
                }

                const grid = document.createElement('div');
                grid.className = 'matcher-grid';
                items.forEach(item => grid.appendChild(this.createTile(item)));
                container.appendChild(grid);
            }

            createTile(item) {
                // Books carry absolute cover URLs from Google Books; TMDB
                // posters are path fragments needing the image host prefix.
                let artwork = POSTER_PLACEHOLDER;
                if (item.poster_path) {
                    artwork = item.content_type === 'book'
                        ? item.poster_path
                        : `${this.imageBaseURL}${item.poster_path}`;
                }

                const year = item.release_date ? new Date(item.release_date).getFullYear() : NaN;
                const subtitle = (item.content_type === 'book' && item.authors && item.authors.length)
                    ? item.authors.join(', ')
                    : (Number.isFinite(year) ? String(year) : '');
                const typeLabel = { movie: 'Movie', tv: 'TV', book: 'Book' }[item.content_type] || '';

                const tile = document.createElement('div');
                tile.className = 'matcher-tile';
                tile.innerHTML = `
                    <img src="${artwork}" alt="" onerror="this.src='${POSTER_PLACEHOLDER}'">
                    <span class="matcher-tile-badge">${typeLabel}</span>
                    <div class="matcher-tile-overlay">
                        <div class="matcher-tile-title"></div>
                        <div class="matcher-tile-sub"></div>
                        <div>
                            <button type="button" class="matcher-tile-remove">
                                <i class="fas fa-trash me-1"></i>Remove
                            </button>
                        </div>
                    </div>
                `;

                // Titles come from third-party APIs, so set them as text rather
                // than interpolating into the HTML string above.
                tile.querySelector('.matcher-tile-title').textContent = item.title;
                tile.querySelector('.matcher-tile-sub').textContent = subtitle;
                tile.querySelector('.matcher-tile-remove').addEventListener(
                    'click', () => this.removeItem(item.tmdb_id, item.content_type));

                return tile;
            }

            async removeItem(itemId, contentType) {
                try {
                    const response = await fetch('/api/remove-from-watchlist', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: itemId, content_type: contentType })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const contentTypeHeader = response.headers.get('content-type');
                    if (contentTypeHeader && contentTypeHeader.includes('application/json')) {
                        const data = await response.json();
                        if (data.error) {
                            throw new Error(data.error);
                        }
                    }

                    this.showSuccess(contentType === 'book' ? 'Removed from reading list' : 'Removed from watchlist');
                    this.loadItems();
                } catch (error) {
                    console.error('Error removing item:', error);
                    this.showError(error.message || 'Failed to remove item');
                }
            }

            showLoading(show) {
                this.loadingState.classList.toggle('d-none', !show);
            }

            showError(message) {
                this.errorMessage.textContent = message;
                this.errorAlert.classList.remove('d-none');
            }

            hideError() {
                this.errorAlert.classList.add('d-none');
            }

            showSuccess(message) {
                const successAlert = document.createElement('div');
                successAlert.className = 'alert alert-success alert-dismissible fade show';
                successAlert.innerHTML = `
                    <i class="fas fa-check-circle me-2"></i>
                    <span></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                `;
                successAlert.querySelector('span').textContent = message;

                const container = document.querySelector('.container');
                if (container && container.firstChild) {
                    container.insertBefore(successAlert, container.firstChild.nextSibling);
                }

                setTimeout(() => {
                    if (successAlert.parentNode) {
                        successAlert.remove();
                    }
                }, 3000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.app = new WatchlistApp();

            document.getElementById('downloadCsvBtn').addEventListener('click', async () => {
                try {
                    const response = await fetch('/api/download-watchlist-csv');
                    if (response.ok) {
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.style.display = 'none';
                        a.href = url;
                        a.download = 'my-watchlist.csv';
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                        document.body.removeChild(a);
                    } else {
                        alert('Failed to download watchlist');
                    }
                } catch (error) {
                    console.error('Error downloading CSV:', error);
                    alert('Failed to download watchlist');
                }
            });
        });
    </script>
</body>
</html>
