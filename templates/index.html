<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matcher · Find your next favourite</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar sticky-top matcher-navbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-star text-info me-2"></i>Matcher
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="/watchlist" class="matcher-nav-link">
                    <i class="fas fa-bookmark me-1"></i>Watchlist
                </a>
                <div id="authArea"></div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="text-center matcher-hero mb-5">
            <h1 class="mb-3">Find your next favourite</h1>
            <p class="lead mb-0">
                Name four things you love. We'll find the one you haven't seen yet.
            </p>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-md-4">
                <a href="/movies" class="matcher-pick-card">
                    <i class="fas fa-film"></i>
                    <span class="matcher-pick-title">Movies</span>
                    <span class="matcher-pick-sub">Powered by TMDB</span>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/tv" class="matcher-pick-card">
                    <i class="fas fa-tv"></i>
                    <span class="matcher-pick-title">TV Series</span>
                    <span class="matcher-pick-sub">Your next binge</span>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/books" class="matcher-pick-card">
                    <i class="fas fa-book"></i>
                    <span class="matcher-pick-title">Books</span>
                    <span class="matcher-pick-sub">Powered by Google Books</span>
                </a>
            </div>
        </div>

        <div class="text-center mt-5" id="footerSignInPrompt">
            <p class="text-muted small mb-3">
                Sign in to keep your watchlist and taste profile across devices.
            </p>
            <div class="d-flex justify-content-center" id="footerSignIn"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
